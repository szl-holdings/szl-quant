# scheduled-paper.yml — autonomous receipt ledger.
#
# Every ~6h: run one advisory paper session on live public feeds, DSSE-sign
# every decision, INDEPENDENTLY verify the fresh receipts against the pinned
# engine pubkey, then append them to the unprotected `ledger` data branch
# (org house pattern: attestations/status-style data branches).
#
# Honesty notes:
#   - GitHub cron is best-effort; gaps in the ledger mean runs did not fire
#     or feeds were down — the ledger MEASURES what happened, promises nothing.
#   - The signing key comes from a repo Actions secret; if it is missing the
#     job FAILS CLOSED — no unsigned entries, ever.
#   - Feeds down ⇒ the session still emits honest BLOCKED/UNAVAILABLE
#     receipts; an "empty" run is a truthful run.
# All actions pinned to full-length commit SHAs (org convention).
name: scheduled-paper
on:
  schedule:
    - cron: '17 */6 * * *'   # offset minute; GitHub drops top-of-hour crons more often
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: scheduled-paper
  cancel-in-progress: false
jobs:
  paper-session:
    if: github.repository == 'szl-holdings/szl-quant'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Materialize signing key (fail closed if absent)
        env:
          SIGNING_KEY_PEM: ${{ secrets.SZL_QUANT_SIGNING_KEY_PEM }}
        run: |
          umask 077
          if [ -z "$SIGNING_KEY_PEM" ]; then
            echo "::error::SZL_QUANT_SIGNING_KEY_PEM secret is missing — refusing to run unsigned (fail closed)"
            exit 1
          fi
          printf '%s\n' "$SIGNING_KEY_PEM" > "$RUNNER_TEMP/engine_key.pem"
      - name: Run paper session (advisory, paper-only)
        env:
          SZL_QUANT_KEY: ${{ runner.temp }}/engine_key.pem
        run: |
          mkdir -p "$RUNNER_TEMP/receipts"
          node bin/quant.mjs paper --out "$RUNNER_TEMP/receipts"
      - name: Independently verify fresh receipts against pinned pubkey
        run: node verify/verify.mjs --pubkey keys/engine_pubkey.json --dir "$RUNNER_TEMP/receipts"
      - name: Append receipts to ledger branch (+ regenerate signed track record)
        env:
          GH_TOKEN: ${{ github.token }}
          SZL_QUANT_KEY: ${{ runner.temp }}/engine_key.pem
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          DEST="ledger/${STAMP}_run${GITHUB_RUN_NUMBER}"
          WORK=/tmp/ledger-work
          mkdir -p "$WORK" && cd "$WORK"
          git init -q -b ledger .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch -q origin ledger 2>/dev/null; then
            git reset -q --hard FETCH_HEAD
          else
            echo "no ledger branch yet — creating it (first entry)"
          fi
          mkdir -p "$DEST"
          cp "$RUNNER_TEMP"/receipts/*.json "$DEST"/
          # Score the FULL ledger (verified receipts only) → signed track-record
          # receipt lands in this run's dir; then independently re-verify the
          # whole new dir (session + signals + track record) against the pin.
          node "$GITHUB_WORKSPACE/bin/quant.mjs" track --ledger ledger --out "$DEST" --histdays 60
          # Advance the stateful paper book from THIS run's verified decisions
          # (genesis starts the paper fund; prior runs stay advisory-only).
          node "$GITHUB_WORKSPACE/bin/quant.mjs" book --ledger ledger --dest "$(basename "$DEST")"
          # Census the run's verdicts — refusals become countable, signed facts.
          node "$GITHUB_WORKSPACE/bin/quant.mjs" refusals --ledger ledger --dest "$(basename "$DEST")"
          # Seal the run into the hash chain (genesis backfills pre-chain runs),
          # then verify this run dir, walk the full chain, AND replay the book
          # independently — the publish fails closed if any check fails.
          node "$GITHUB_WORKSPACE/bin/quant.mjs" chain --ledger ledger --dest "$(basename "$DEST")"
          # Anchor the new chain head in the Rekor public transparency log (fail-soft: an outage is an honest, counted gap).
          node "$GITHUB_WORKSPACE/bin/quant.mjs" witness --ledger ledger --witness-dir witness --all
          node "$GITHUB_WORKSPACE/verify/verify.mjs" --pubkey "$GITHUB_WORKSPACE/keys/engine_pubkey.json" --dir "$DEST"
          node "$GITHUB_WORKSPACE/verify/verify.mjs" --pubkey "$GITHUB_WORKSPACE/keys/engine_pubkey.json" --chain ledger
          node "$GITHUB_WORKSPACE/verify/verify.mjs" --pubkey "$GITHUB_WORKSPACE/keys/engine_pubkey.json" --book ledger
          node "$GITHUB_WORKSPACE/verify/verify.mjs" --pubkey "$GITHUB_WORKSPACE/keys/engine_pubkey.json" --refusals ledger
          if ls witness/witness_*.receipt.json >/dev/null 2>&1; then
            node "$GITHUB_WORKSPACE/verify/verify.mjs" --pubkey "$GITHUB_WORKSPACE/keys/engine_pubkey.json" --rekor-pubkey "$GITHUB_WORKSPACE/keys/rekor_pubkey.pem" --tsa-anchors "$GITHUB_WORKSPACE/keys/tsa" --observer-pubkey "$GITHUB_WORKSPACE/keys/observer_pubkey.json" --witness .
          else
            echo "witness: no anchors yet (rekor unreachable so far) — an honest gap, stated in the open"
          fi
          # Regenerate INDEX.md — counts MEASURED from the files actually present.
          node -e '
            const fs = require("node:fs");
            const dirs = fs.existsSync("ledger") ? fs.readdirSync("ledger").filter(d => fs.statSync("ledger/"+d).isDirectory()).sort() : [];
            let total = 0;
            const rows = dirs.map(d => {
              const files = fs.readdirSync("ledger/"+d).filter(f => f.endsWith(".json"));
              total += files.length;
              return `| ${d} | ${files.length} |`;
            });
            // Latest signed track record → honest headline (fail-soft if none).
            let track = null;
            const trs = [];
            for (const d of dirs) for (const f of fs.readdirSync("ledger/"+d)) if (f.startsWith("trackrecord_") && f.endsWith(".json")) trs.push("ledger/"+d+"/"+f);
            trs.sort();
            if (trs.length) {
              try {
                const env = JSON.parse(fs.readFileSync(trs[trs.length-1], "utf8"));
                track = JSON.parse(Buffer.from(env.payload, "base64").toString()).predicate.summary;
              } catch {}
            }
            const trackLine = track
              ? `Track record (latest, MEASURED from verified receipts only): ${Object.entries(track.aggregates).map(([k,a]) => `+${k.slice(1,-1)}d n=${a.nRealized} hit=${a.hitRate===null?"—":Math.round(a.hitRate*100)+"%"} pending=${a.nPending}`).join(" · ")} · no-calls(BLOCKED)=${track.population.blocked} — a past frequency, NOT a prediction`
              : "Track record: no track-record receipt yet.";
            // Paper-book headline from the highest-seq book receipt (fail-soft).
            let bookLine = "Paper book: no book receipt yet.";
            const bfs = [];
            for (const d of dirs) for (const f of fs.readdirSync("ledger/"+d)) if (/^book_\d+\.receipt\.json$/.test(f)) bfs.push("ledger/"+d+"/"+f);
            if (bfs.length) {
              try {
                const bodies = bfs.map(p => JSON.parse(Buffer.from(JSON.parse(fs.readFileSync(p,"utf8")).payload,"base64").toString()).predicate.summary);
                bodies.sort((a,b) => a.seq - b.seq);
                const h = bodies[bodies.length-1];
                const eq = h.mark.equityUsd === null ? "UNAVAILABLE (unpriced positions — honest empty)" : "$"+h.mark.equityUsd;
                bookLine = `Paper book (MODELED, paper-only — NOT real funds): seq ${h.seq} · equity ${eq} · open positions ${(h.mark.positions||[]).length} · fills this run ${h.fills.length} · replay it: \`node verify/verify.mjs --pubkey keys/engine_pubkey.json --book ledger/\``;
              } catch {}
            }
            // Refusal-record headline: latest census + lifetime sums (fail-soft).
            let refusalsLine = "Refusal record: none yet.";
            const rfs = [];
            for (const d of dirs) for (const f of fs.readdirSync("ledger/"+d)) if (/^refusals_\d+\.receipt\.json$/.test(f)) rfs.push("ledger/"+d+"/"+f);
            if (rfs.length) {
              try {
                const bodies = rfs.map(p => JSON.parse(Buffer.from(JSON.parse(fs.readFileSync(p,"utf8")).payload,"base64").toString()).predicate.summary);
                bodies.sort((a,b) => a.runDir < b.runDir ? -1 : 1);
                const h = bodies[bodies.length-1];
                const fmt = (arr) => [...arr].sort((a,b)=>b.count-a.count).map(x=>x.gate+"\u00d7"+x.count).join(" ");
                let lb=0, ld=0; const lg={};
                for (const b of bodies){ lb+=b.totals.blocked; ld+=b.totals.decisions; for(const x of b.totals.refusalsByGate) lg[x.gate]=(lg[x.gate]??0)+x.count; }
                const lifeArr = Object.entries(lg).map(([gate,count])=>({gate,count}));
                refusalsLine = `Refusal record (MEASURED): latest run BLOCKED ${h.totals.blocked}/${h.totals.decisions}${h.totals.refusalsByGate.length?" — "+fmt(h.totals.refusalsByGate):""} · lifetime (recorded runs) ${lb}/${ld}${lifeArr.length?" — "+fmt(lifeArr):""} · a refusal is a decision, not an absence · replay: \`node verify/verify.mjs --pubkey keys/engine_pubkey.json --refusals ledger/\``;
              } catch {}
            }
            // External-witness headline: newest Rekor anchor + coverage (fail-soft).
            let witnessLine = "External witness: none yet — no chain head anchored so far (rekor unreachable); the gap is counted, not hidden.";
            try {
              const wf = fs.existsSync("witness") ? fs.readdirSync("witness").filter(f => /^witness_\d{4}_\d+\.receipt\.json$/.test(f)) : [];
              if (wf.length) {
                const wbodies = wf.map(f => JSON.parse(Buffer.from(JSON.parse(fs.readFileSync("witness/"+f,"utf8")).payload,"base64").toString()).predicate.summary);
                const consFiles = fs.readdirSync("witness").filter(f => /^consistency_\d+-\d+_\d+\.receipt\.json$/.test(f));
                const tsaFiles = fs.readdirSync("witness").filter(f => /^tsa_\d{4}_\d+\.receipt\.json$/.test(f));
              const obsFiles = fs.existsSync("witness/gossip") ? fs.readdirSync("witness/gossip").filter(f => /^obs_\d{4}_\d+\.observation\.json$/.test(f)) : [];
                const cpSizes = new Set(wbodies.filter(b => b.rekor && b.rekor.inclusionProof).map(b => b.rekor.inclusionProof.treeSize));
                const consEdges = Math.max(0, cpSizes.size - 1);
                wbodies.sort((a,b) => a.chain.seq - b.chain.seq);
                const wh = wbodies[wbodies.length-1];
                let links = 0;
                for (const d of dirs) for (const f of fs.readdirSync("ledger/"+d)) if (/^chain_\d{4}\.receipt\.json$/.test(f)) links++;
                const seqs = new Set(wbodies.map(b => b.chain.seq));
                const proven = new Set(wbodies.filter(b => b.rekor && b.rekor.inclusionProof).map(b => b.chain.seq));
                witnessLine = `External witness (REPORTED, SET + Merkle inclusion + log consistency offline-verifiable): chain head seq ${wh.chain.seq} anchored in Rekor — logIndex ${wh.rekor.logIndex}, uuid ${String(wh.rekor.uuid).slice(0,16)}… · heads anchored ${seqs.size}/${links} · inclusion proven offline ${proven.size}/${links} · log consistency ${consFiles.length}/${consEdges} adjacent checkpoint pair(s) receipted · second witness (RFC 3161) ${tsaFiles.length}/${links} head(s) countersigned · cross-witness gossip ${obsFiles.length} observation(s) from a second scheduled observer · an anchored head cannot be silently truncated · check: \`node verify/verify.mjs --pubkey keys/engine_pubkey.json --witness .\``;
              }
            } catch {}
            // Hash-chain headline from the newest chain receipt (fail-soft).
            let chainLine = "Hash chain: no chain receipt yet.";
            const cfs = [];
            for (const d of dirs) for (const f of fs.readdirSync("ledger/"+d)) if (/^chain_\d{4}\.receipt\.json$/.test(f)) cfs.push("ledger/"+d+"/"+f);
            if (cfs.length) {
              try {
                const crypto = require("node:crypto");
                const byches = cfs.map(p => ({ p, body: JSON.parse(Buffer.from(JSON.parse(fs.readFileSync(p,"utf8")).payload,"base64").toString()).predicate.summary }));
                byches.sort((a,b) => a.body.seq - b.body.seq);
                const head = byches[byches.length-1];
                const sha = crypto.createHash("sha256").update(fs.readFileSync(head.p)).digest("hex");
                chainLine = `Hash chain: ${byches.length} link(s), head seq ${head.body.seq} sha256 ${sha.slice(0,12)}… — every sealed run tamper-evident; walk it: \`node verify/verify.mjs --pubkey keys/engine_pubkey.json --chain ledger/\``;
              } catch {}
            }
            const md = [
              "# szl-quant receipt ledger",
              "",
              "Append-only DSSE receipt ledger written by the `scheduled-paper` workflow.",
              "Every file is an advisory **paper-only** decision receipt, ed25519-signed by the",
              "engine identity pinned at `keys/engine_pubkey.json` on `main`.",
              "",
              "Verify any entry independently:",
              "```",
              "node verify/verify.mjs --pubkey keys/engine_pubkey.json --dir ledger/<run-dir>/",
              "```",
              "",
              `Runs recorded: ${dirs.length} · receipts: ${total} (MEASURED from files present; cron is best-effort, gaps are honest)`,
              "",
              trackLine,
              "",
              chainLine,
              "",
              bookLine,
              "",
              refusalsLine,
              "",
              witnessLine,
              "",
              "| run (UTC) | receipts |",
              "|---|---|",
              ...rows,
              "",
              "_Advisory research output. NOT financial advice. No execution, no custody._",
              ""
            ].join("\n");
            fs.writeFileSync("INDEX.md", md);
          '
          # External witness: headline facts also land in the Actions run
          # summary, which lives OUTSIDE the ledger branch — head truncation
          # of the ledger must now also erase run history to go unnoticed.
          { echo "## szl-quant ledger ${STAMP}"; grep -E '^(Track record|Hash chain|Paper book|Refusal record|External witness)' INDEX.md | sed 's/^/- /'; } >> "$GITHUB_STEP_SUMMARY" || true
          git add -A
          git commit -q -m "ledger: paper session ${STAMP} (run ${GITHUB_RUN_ID})"
          git push -q origin ledger
          echo "appended $(ls "$DEST" | wc -l) receipt(s) → ${DEST}"
