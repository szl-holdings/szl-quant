# CI for szl-quant — unit tests + receipt verification.
#
# NOTE (honest limitation, stated rather than worked around): this file
# lives in scripts/ because the automation token that created this repo
# lacks the `workflow` scope required to write .github/workflows/*.
# Activation is a 30-second owner step:
#   git mv scripts/ci.workflow.yml .github/workflows/ci.yml && git push
# (or move it in the GitHub UI). See scripts/ACTIVATE_CI.md.
#
# Org convention: all actions pinned to a full-length commit SHA.
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 (org-approved SHA)
      - uses: actions/setup-node@6044e13b5df428b1cd8e9b17df0f8a029f227b0b # v6.0.0
        with:
          node-version: '22'
      - name: Unit tests (doctrine invariants, DSSE, gates, determinism)
        run: node --test test/engine.test.mjs
      - name: Verify committed receipts against pinned engine pubkey
        run: |
          if ls receipts/*.json >/dev/null 2>&1; then
            node verify/verify.mjs --pubkey keys/engine_pubkey.json --dir receipts/
          else
            echo "no receipts committed yet — nothing to verify (honest empty)"
          fi
